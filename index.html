<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地震データベースWeb</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>地震データベースWeb</h1>
        <p class="attention">2023年03月03日以降の地震データを閲覧できます。<br>地震規模が更新された場合、同一日時データが複数表示されます。<br>2026年04月25日以前の震央は代表地点が表示されます。</p>
    </header>
    
    <section id="search-bar">
        <div class="input-group">
            <label>期間:</label>
            <input type="date" id="search-date-start"> ～ 
            <input type="date" id="search-date-end">
        </div>

        <div class="input-group">
            <label>地域:</label>
            <input type="text" id="search-location" placeholder="例: 奄美" style="width: 80px;">
        </div>

        <div class="input-group">
            <label>最小M:</label>
            <input type="number" id="search-mag" step="0.1" value="0" min="0" style="width: 60px;">
        </div>

        <div class="input-group">
            <label>最小震度:</label>
            <select id="search-intensity">
                <option value="0">すべて</option>
                <option value="1">震度 1 以上</option>
                <option value="2">震度 2 以上</option>
                <option value="3">震度 3 以上</option>
                <option value="4">震度 4 以上</option>
                <option value="4.5">震度 5弱 以上</option>
                <option value="5.5">震度 5強 以上</option>
                <option value="6.5">震度 6弱 以上</option>
                <option value="7.5">震度 6強 以上</option>
                <option value="8">震度 7</option>
            </select>
        </div>
        <button id="btn-search">検索</button>
        <span id="result-count">読み込み中...</span>
    </section>

    <main>
        <div id="map"></div>
        <div id="info-panel">
            <h2>詳細情報</h2>
            <p class="placeholder">マーカーを選択してください</p>
            <div id="details"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="script.js"></script>

    <footer>
        <p id="site-version"></p>
        <script src="version.js"></script>
    </footer>
</body>
</html>
